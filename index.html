<!-- Section Tracking Script (React Compatible) -->
<script>
  function initSectionTracking() {
    if (typeof gtag === "undefined") return;

    const sections = document.querySelectorAll("section[id]");

    if (!sections.length) {
      setTimeout(initSectionTracking, 1000);
      return;
    }

    let activeSection = null;
    let sectionStartTime = null;

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        
     if (entry.isIntersecting) {

  const sectionId = entry.target.id;

  // Prevent duplicate firing
  if (activeSection === sectionId) return;

  if (activeSection && sectionStartTime) {
    const timeSpent = Math.round((Date.now() - sectionStartTime) / 1000);

    gtag('event', 'section_time_spent', {
      section_name: activeSection,
      time_seconds: timeSpent
    });
  }

  activeSection = sectionId;
  sectionStartTime = Date.now();

  gtag('event', 'section_view', {
    section_name: activeSection
  });

  console.log("Section view:", activeSection);
}

      });
    }, { threshold: 0.5 });

    sections.forEach(section => {
      observer.observe(section);
    });
  }

  window.addEventListener("load", function () {
    setTimeout(initSectionTracking, 1500);
  });
</script>
